<script>
    b_usuario.innerHTML = sessionStorage.NICK_USUARIO;
    document.getElementById('informacoes_nome').innerHTML = sessionStorage.NOME_USUARIO;
   
   function plotarGraficoPokemonAll() {
    var usuarioVar = sessionStorage.ID_USUARIO;
    fetch("/pokedex/buscarPokemonParaGrafico", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                usuarioServer: usuarioVar,
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(async json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    let pokemon_do_usuario = json;
                    let registrados = 0;
                    let not_registrados = 0;
                    for (let i = 0; i < pokemon_do_usuario.length ;i++) {
                        if (pokemon_do_usuario[i].registrado == 1) {
                            registrados ++
                        } else { not_registrados ++ }
                    }
                    let informacao_pokemon_registrados = [registrados, not_registrados]
                    document.getElementById("kpi_pokemon_all").innerHTML = `<span class="texto-kpi">${registrados}</span>`;
                    let grafico_principal = new Chart(document.getElementById('grafico-all'), {
                        type: 'pie',
                        data: {
                        labels: ['Registrados', 'Não Registrados'],
                        datasets: [{
                        data: informacao_pokemon_registrados,
                        backgroundColor: ['#dc143c', '#444']
                }]
            }
        });
        
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }})
        }
    plotarGraficoPokemonAll()

    function mudar_tipo_grafico() {
        var usuarioVar = sessionStorage.ID_USUARIO;
    fetch("/pokedex/buscarPokemonParaGrafico", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                usuarioServer: usuarioVar,
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(async json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    let pokemon_do_usuario = json;
                    let tipo = document.getElementById('tipo_pokemon_grafico').value;
                    let registrados = 0;
                    let not_registrados = 0;
                    for (let i = 0; i < pokemon_do_usuario.length ;i++) {
                        if (pokemon_do_usuario[i].registrado == 1 && (pokemon_do_usuario[i].tipo_primario == tipo || pokemon_do_usuario[i].tipo_secundario == tipo)) {
                            registrados ++
                        } else if (pokemon_do_usuario[i].registrado == 0 && (pokemon_do_usuario[i].tipo_primario == tipo || pokemon_do_usuario[i].tipo_secundario == tipo)) { not_registrados ++ }
                    }
                    let informacao_pokemon_registrados = [registrados, not_registrados]
                    document.getElementById("kpi_pokemon_tipo").innerHTML = `<span class="texto-kpi">${registrados}</span>`;
                    let grafico_tipo_especifico = new Chart(document.getElementById('grafico_tipo_especifico'), {
                        type: 'pie',
                        data: {
                        labels: ['Registrados', 'Não Registrados'],
                        datasets: [{
                        data: informacao_pokemon_registrados,
                        backgroundColor: ['#dc143c', '#444']
                }]
            }
        });
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }})
        
    }
</script>
