<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTech | Dashboards</title>

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="janela">
        <div class="header-left dash-header">

            <h1 style="color: #deedc8;">CTA Helper</h1>

            <div class="hello">
                <h3 style="color: #deedc8;">Olá, <span  id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>Pokedex</h3>
                </a>
            </div>

            <div class="btn-nav">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>
        <div class="dash-content white">
            <div id="div_informacoes">
                <h1>Ola treinador <span id="informacoes_nome"></span>, aqui estao seus dados:</h1>
            </div>
            
            <div id="div_progress_bar">
                <div class="div-kpi-dentro-do-grafico" id="kpi-progress-bar">
                </div>
                <div id="progress_bar">
                    <div id="in_progress_bar" style="height: 100%; width: 0%; background-color: #bfe685; border-radius: 100px;"></div>
                </div>
            </div>
            <div class="grafico-pizza">
                <h3>Pokemon registrados:</h3>
                <div class="div-kpi-dentro-do-grafico" id="kpi_pokemon_all"></div>
                <div id="div-grafico">
                    <canvas id="grafico-all"></canvas>
                </div>    
            </div>

            <div class="grafico-pizza">
                <h3>Pokemon registrados do tipo <select name="tipo_pokemon_grafico" id="tipo_pokemon_grafico">
                    <option value="Normal">Normal</option>
                    <option value="Lutador">Lutador</option>
                    <option value="Voador">Voador</option>
                    <option value="Veneno">Veneno</option>
                    <option value="Terra">Terra</option>
                    <option value="Pedra">Pedra</option>
                    <option value="Inseto">Inseto</option>
                    <option value="Fantasma">Fantasma</option>
                    <option value="Fogo">Fogo</option>
                    <option value="Água">Agua</option>
                    <option value="Grama">Grama</option>
                    <option value="Elétrico">Eletrico</option>
                    <option value="Psíquico">Psíquico</option>
                    <option value="Gelo">Gelo</option>
                    <option value="Noturno">Noturno</option>
                    <option value="Dragão">Dragao</option>
                    <option value="Fada">Fada</option>
                    <option value="Metal">Metal</option>
                </select>:</h3>
                <button onclick="mudar_tipo_grafico()" id="filter-button">Filtrar</button>
                <div class="div-kpi-dentro-do-grafico" id="kpi_pokemon_tipo"></div>
                <div id="div-grafico">
                    <canvas id="grafico_tipo_especifico"></canvas>
                </div>
            </div>
            <div class="grafico-pizza">
                <h3>Pokemon registrados por Regiao:</h3>
                <div id="div-grafico">
                    <canvas id="grafico-region"></canvas>
                </div>    
            </div>
        </div>
    </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NICK_USUARIO;
    document.getElementById('informacoes_nome').innerHTML = sessionStorage.NOME_USUARIO;
   
   function plotarGraficoPokemonAll() {
    var usuarioVar = sessionStorage.ID_USUARIO;
    fetch("/pokedex/buscarPokemonParaGrafico", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                usuarioServer: usuarioVar,
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(async json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    let pokemon_do_usuario = json;
                    let registrados = 0;
                    let not_registrados = 0;
                    for (let i = 0; i < pokemon_do_usuario.length ;i++) {
                        if (pokemon_do_usuario[i].registrado == 1) {
                            registrados ++
                        } else { not_registrados ++ }
                    }
                    let informacao_pokemon_registrados = [registrados, not_registrados]
                    document.getElementById("kpi_pokemon_all").innerHTML = `<span class="texto-kpi">${registrados}</span>`;
                    let grafico_principal = new Chart(document.getElementById('grafico-all'), {
                        type: 'pie',
                        data: {
                            labels: ['Registrados', 'Não Registrados'],
                            datasets: [{
                                data: informacao_pokemon_registrados,
                                backgroundColor: ['#dc143c', '#444']
                            }]
                        }
                    });
                    let progress = (registrados / (registrados + not_registrados)) * 100;
                    document.getElementById("kpi-progress-bar").innerHTML = `${progress}`;
                    document.getElementById("in_progress_bar").style.width = `${progress}%`;
                    let gen1 = 0;
                    let gen2 = 0;
                    let gen3 = 0;
                    let gen4 = 0;
                    let gen5 = 0;
                    let gen6 = 0;
                    let gen7 = 0;
                    let gen8 = 0;
                    let gen9 = 0;

                    for (let i = 0 ;i < pokemon_do_usuario.length; i++) {
                        if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 1) {
                            gen1 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 2) {
                            gen2 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 3) {
                            gen3 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 4) {
                            gen4 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 5) {
                            gen5 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 6) {
                            gen6 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 7) {
                            gen7 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 8) {
                            gen8 ++
                        } else  if (pokemon_do_usuario[i].registrado == 1 && pokemon_do_usuario[i].geracao == 9) {
                            gen9 ++
                        }
                    }

                    let informacao_pokemon_registrados_region = [gen1,gen2,gen3,gen4,gen5,gen6,gen7,gen8,gen9]
                    let grafico_region = new Chart(document.getElementById('grafico-region'), {
                        type: 'bar',
                        data: {
                            labels: ['1 gen', '2 gen', '3 gen', '4 gen', '5 gen', '6 gen', '7 gen', '8 gen', '9 gen'],
                            datasets: [{
                                data: informacao_pokemon_registrados_region,
                                backgroundColor: ['#bfe685','#bfe685','#bfe685','#bfe685','#bfe685','#bfe685','#bfe685','#bfe685','#bfe685',]
                            }]
                        }
                    });
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }})
        }
    plotarGraficoPokemonAll()
    let dados = [];
    let grafico_tipo_especifico = null;
    function mudar_tipo_grafico() {
        var usuarioVar = sessionStorage.ID_USUARIO;
    fetch("/pokedex/buscarPokemonParaGrafico", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                usuarioServer: usuarioVar,
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(async json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    let pokemon_do_usuario = json;
                    let tipo = document.getElementById('tipo_pokemon_grafico').value;
                    let registrados = 0;
                    let not_registrados = 0;
                    for (let i = 0; i < pokemon_do_usuario.length ;i++) {
                        if (pokemon_do_usuario[i].registrado == 1 && (pokemon_do_usuario[i].tipo_primario == tipo || pokemon_do_usuario[i].tipo_secundario == tipo)) {
                            registrados ++
                        } else if (pokemon_do_usuario[i].registrado == 0 && (pokemon_do_usuario[i].tipo_primario == tipo || pokemon_do_usuario[i].tipo_secundario == tipo)) { not_registrados ++ }
                    }
                    dados = [registrados, not_registrados]
                    document.getElementById("kpi_pokemon_tipo").innerHTML = `<span class="texto-kpi">${registrados}</span>`;
                    
                    let color = ``;

                    if (tipo == 'Normal') {
                        color = '#cecece';
                    } else if (tipo == 'Lutador') {
                        color = '#724a34';
                    } else if (tipo == 'Voador') {
                        color = '#b4e5ee';
                    } else if (tipo == 'Veneno') {
                        color = '#946bf3';
                    } else if (tipo == 'Terra') {
                        color = '#58291b';
                    } else if (tipo == 'Pedra') {
                        color = '#2e2c2c';
                    } else if (tipo == 'Inseto') {
                        color = '#b5f184';
                    } else if (tipo == 'Fantasma') {
                        color = '#553c55';
                    } else if (tipo == 'Fogo') {
                        color = '#fa573b';
                    } else if (tipo == 'Água') {
                        color = '#3b77fa';
                    } else if (tipo == 'Grama') {
                        color = '#1e7526';
                    } else if (tipo == 'Elétrico') {
                        color = '#d8bf32';
                    } else if (tipo == 'Psíquico') {
                        color = '#9632d8';
                    } else if (tipo == 'Gelo') {
                        color = '#32a3d8';
                    } else if (tipo == 'Noturno') {
                        color = '#181b1d';
                    } else if (tipo == 'Dragão') {
                        color = '#0003bd';
                    } else if (tipo == 'Fada') {
                        color = '#f383e4';
                    } else if (tipo == 'Metal') {
                        color = '#747373';
                    }

                    if (grafico_tipo_especifico == null) {
                        grafico_tipo_especifico = new Chart(document.getElementById('grafico_tipo_especifico'), {
                            type: 'pie',
                            data: {
                                labels: ['Registrados', 'Não Registrados'],
                                datasets: [{
                                    data: dados,
                                    backgroundColor: [`${color}`, '#444']
                                }]
                            }
                        });
                    } else {
                        grafico_tipo_especifico.data.datasets[0].data = dados;
                        grafico_tipo_especifico.data.datasets[0].backgroundColor = [`${color}`, '#444'];
                        grafico_tipo_especifico.update();
                    }

                   
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }})
        
    }
</script>
